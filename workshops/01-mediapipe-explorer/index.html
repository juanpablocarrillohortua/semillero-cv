<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediaPipe Explorer — Semillero CV</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>MediaPipe Explorer</h1>
    <p class="subtitle">Semillero de Investigaci&oacute;n en Visi&oacute;n por Computador &mdash; Externado</p>
  </header>

  <main>
    <div class="controls">
      <div class="control-group">
        <label for="model-select">Modelo</label>
        <select id="model-select">
          <option value="pose">Pose Estimation (33 landmarks)</option>
          <option value="hands">Hand Tracking (21 per hand)</option>
          <option value="face">Face Mesh (478 landmarks)</option>
          <option value="gesture">Gesture Recognition</option>
          <option value="object">Object Detection</option>
          <option value="segment">Segmentation</option>
        </select>
      </div>
      <div class="control-group">
        <label for="confidence">Confianza: <span id="confidence-value">0.5</span></label>
        <input type="range" id="confidence" min="0.1" max="1.0" step="0.05" value="0.5">
      </div>
      <div class="control-group">
        <label for="source-select">Fuente</label>
        <select id="source-select">
          <option value="webcam">Webcam</option>
          <option value="upload">Subir imagen</option>
        </select>
      </div>
      <button id="btn-start" class="btn-primary">Iniciar Webcam</button>
      <input type="file" id="file-input" accept="image/*,video/*" style="display:none">
    </div>

    <div class="canvas-container">
      <div class="video-wrapper">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="output-canvas"></canvas>
        <img id="uploaded-image" style="display:none">
        <div id="loading-overlay" class="loading-overlay" style="display:none">
          <div class="spinner"></div>
          <p>Cargando modelo...</p>
        </div>
      </div>
    </div>

    <div class="stats-bar">
      <div class="stat">
        <span class="stat-label">FPS</span>
        <span class="stat-value" id="fps">--</span>
      </div>
      <div class="stat">
        <span class="stat-label">Modelo</span>
        <span class="stat-value" id="current-model">--</span>
      </div>
      <div class="stat">
        <span class="stat-label">Detecciones</span>
        <span class="stat-value" id="detections">--</span>
      </div>
      <div class="stat">
        <span class="stat-label">Tiempo (ms)</span>
        <span class="stat-value" id="inference-time">--</span>
      </div>
    </div>

    <div id="model-info" class="model-info">
      <h3 id="info-title">Selecciona un modelo para comenzar</h3>
      <p id="info-description"></p>
    </div>
  </main>

  <footer>
    <p>Semillero CV &mdash; Universidad Externado de Colombia &mdash; 2026</p>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
